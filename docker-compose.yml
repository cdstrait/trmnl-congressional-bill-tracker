services:
  bill-tracker:
    build: .
    container_name: trmnl-bill-tracker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./bills.json:/app/bills.json:ro
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "2"
